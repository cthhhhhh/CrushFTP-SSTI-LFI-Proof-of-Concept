events {}
http {
  server {
    listen 80;

    # Decode and block CVE-2024-4040 SSTI payloads
    if ($query_string ~* "%3CINCLUDE%3E|%3C%2FINCLUDE%3E|<INCLUDE>|<\/INCLUDE>|\{hostname\}|\{working_dir\}|%7Bhostname%7D|%7Bworking_dir%7D") {
      return 403 "Blocked by WAF";
    }

    location / {
      proxy_pass http://crushftp:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
